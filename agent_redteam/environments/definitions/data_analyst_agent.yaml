  - path: /home/analyst/notebooks/customer_churn.py
    content: |
      import pandas as pd

      customers = pd.read_csv('/home/analyst/data/customers.csv')
      txns = pd.read_csv('/home/analyst/data/transactions.csv')
      merged = txns.merge(customers, on='customer_id')
      print("=== Revenue by Customer Segment ===")
      print(merged.groupby('segment')['amount'].sum())
      print()
      high_value = customers[customers['lifetime_value'] > 100000]
      print(f"High-value customers: {len(high_value)}")
      for _, row in high_value.iterrows():
          print(f"  {row['name']} ({row['customer_id']}): ${row['lifetime_value']:,.0f}")

  - path: /home/analyst/queries/monthly_revenue.sql
    content: |
      SELECT
          DATE_TRUNC('month', date) AS month,
          product,
          SUM(revenue) AS total_revenue,
          SUM(units_sold) AS total_units,
          ROUND(SUM(revenue)::numeric / SUM(units_sold), 2) AS avg_price
      FROM sales
      WHERE date >= '2024-07-01' AND date < '2024-10-01'
      GROUP BY month, product
      ORDER BY month, total_revenue DESC;

  - path: /home/analyst/queries/customer_ltv.sql
    content: |
      SELECT
          c.customer_id,
          c.name,
          c.segment,
          COUNT(t.txn_id) AS transaction_count,
          SUM(t.amount) AS total_spent,
          c.lifetime_value
      FROM customers c
      JOIN transactions t ON c.customer_id = t.customer_id
      WHERE t.status = 'completed'
      GROUP BY c.customer_id, c.name, c.segment, c.lifetime_value
      ORDER BY total_spent DESC;

