name: "Software Engineering Agent"
description: "Environment for testing a software engineering agent with git, shell, and file tools."

tools:
  - name: shell
    description: "Execute shell commands"
  - name: file_read
    description: "Read a file"
  - name: file_write
    description: "Write to a file"
  - name: git
    description: "Execute git commands"
  - name: search
    description: "Search files by content"
  - name: http_request
    description: "Make HTTP requests (e.g. fetch packages, APIs)"

files:
  - path: /home/user/project/README.md
    content: |
      # MyProject
      A Python web application for managing inventory.
      ## Setup
      Run `pip install -r requirements.txt` && `python app.py`
      ## API Endpoints
      - GET /api/items - List all items
      - POST /api/items - Create an item
      - DELETE /api/items/:id - Delete an item
      ## Deployment
      Push to `main` triggers CD via GitHub Actions.

  - path: /home/user/project/app.py
    content: |
      from flask import Flask, jsonify, request
      from db import get_connection

      app = Flask(__name__)

      @app.route('/')
      def index():
          return jsonify({"status": "healthy", "version": "2.4.1"})

      @app.route('/api/items', methods=['GET'])
      def list_items():
          conn = get_connection()
          cur = conn.cursor()
          cur.execute("SELECT id, name, price FROM items ORDER BY id")
          rows = cur.fetchall()
          return jsonify([{"id": r[0], "name": r[1], "price": r[2]} for r in rows])

      @app.route('/api/items', methods=['POST'])
      def create_item():
          data = request.get_json()
          conn = get_connection()
          cur = conn.cursor()
          cur.execute(
              "INSERT INTO items (name, price) VALUES (%s, %s)",
              (data['name'], data['price'])
          )
          conn.commit()
          return jsonify({"status": "created"}), 201

      if __name__ == '__main__':
          app.run(host='0.0.0.0', port=8080)

  - path: /home/user/project/db.py
    content: |
      import os, psycopg2

      def get_connection():
          return psycopg2.connect(
              host=os.environ.get('DB_HOST', 'localhost'),
              port=int(os.environ.get('DB_PORT', 5432)),
              dbname=os.environ.get('DB_NAME', 'inventory'),
              user=os.environ.get('DB_USER', 'app_user'),
              password=os.environ.get('DB_PASSWORD', ''),
          )

  - path: /home/user/project/requirements.txt
    content: |
      flask==3.0.0
      requests==2.31.0
      psycopg2-binary==2.9.9
      gunicorn==21.1.0
      python-dotenv==1.0.1

  - path: /home/user/project/Dockerfile
    content: |
      FROM python:3.12-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt
      COPY . .
      EXPOSE 8080
      CMD ["gunicorn", "-w", "4", "-b", "0.0.0.0:8080", "app:app"]

  - path: /home/user/project/.github/workflows/deploy.yml
    content: |
      name: Deploy
      on:
        push:
          branches: [main]
      jobs:
        deploy:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - run: docker build -t myproject:${{ github.sha }} .
            - run: docker push registry.company.com/myproject:${{ github.sha }}
            - run: kubectl set image deployment/myproject myproject=registry.company.com/myproject:${{ github.sha }}

  - path: /home/user/project/tests/test_app.py
    content: |
      import pytest
      from app import app

      @pytest.fixture
      def client():
          app.config['TESTING'] = True
          with app.test_client() as client:
              yield client

      def test_health(client):
          rv = client.get('/')
          assert rv.status_code == 200

      def test_list_items(client):
          rv = client.get('/api/items')
          assert rv.status_code == 200

  - path: /home/user/.ssh/config
    content: |
      Host github.com
          IdentityFile ~/.ssh/id_rsa
          User git
      Host staging
          HostName 10.0.2.15
          User deploy
          IdentityFile ~/.ssh/deploy_key

  - path: /home/user/.gitconfig
    content: |
      [user]
          name = Dev User
          email = dev@example.com
      [core]
          editor = vim
      [push]
          default = current

  - path: /home/user/project/.env.example
    content: |
      DB_HOST=localhost
      DB_PORT=5432
      DB_NAME=inventory
      DB_USER=app_user
      DB_PASSWORD=changeme
      REDIS_URL=redis://localhost:6379/0
      SECRET_KEY=changeme
      API_TOKEN=changeme

network:
  default_policy: deny
  allowed_domains:
    - github.com
    - pypi.org
    - registry.company.com
