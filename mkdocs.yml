site_name: agent-redteam
site_url: https://saichandrapandraju.github.io/agent-redteam
site_description: Open-source Python library for automated vulnerability assessment of LLM agents
repo_url: https://github.com/saichandrapandraju/agent-redteam
repo_name: saichandrapandraju/agent-redteam
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github
    logo: material/shield-alert
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
    - Getting Started: getting-started.md
    - Scanning Models: scanning-models.md
    - Scanning Agents: scanning-agents.md
    - Understanding Results: understanding-results.md
    - Vulnerability Classes: vulnerability-classes.md
    - Attack Templates: attack-templates.md
    - Configuration: configuration.md
    - pytest Integration: pytest-integration.md
  - Architecture: architecture.md
  - Contributing:
    - How to Contribute: contributing/index.md
    - Project Structure: contributing/project-structure.md
    - Adding Attack Templates: contributing/adding-templates.md
    - Adding Detectors: contributing/adding-detectors.md
    - Adding Adapters: contributing/adding-adapters.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/saichandrapandraju/agent-redteam
